spring:
  application:
    name: finhub
  datasource:
    url: jdbc:mysql://121.89.92.242:3306/finhub?rewriteBatchedStatements=true&batchSize=1000&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:finhub}
    password: ${DB_PASSWORD:finhub}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

server:
  port: 8080

finhub:
  auth:
    username: ${BASIC_AUTH_USERNAME:admin}
    password: ${BASIC_AUTH_PASSWORD:}
  fingerprint:
    # 排重指纹盐值，每实例独立；开发默认值仅本地调试，生产必须通过环境变量注入
    salt: ${FINHUB_FINGERPRINT_SALT:dev-salt-please-override}
  encryption:
    # AES-256 密钥，必须恰好 32 字节（EncryptedString.validateKeyLength 强校验）
    # 开发默认值为 32 字节十六进制占位串，生产必须通过环境变量注入
    key: ${FINHUB_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}

logging:
  level:
    com.finhub: DEBUG
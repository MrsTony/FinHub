spring:
  application:
    name: finhub
  datasource:
    url: jdbc:mysql://121.89.92.242:3306/finhub?rewriteBatchedStatements=true&batchSize=1000&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:finhub}
    password: ${DB_PASSWORD:finhub}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler

server:
  port: 8080

finhub:
  auth:
    username: ${BASIC_AUTH_USERNAME:admin}
    password: ${BASIC_AUTH_PASSWORD}

logging:
  level:
    com.finhub: DEBUG